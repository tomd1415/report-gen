<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <link rel="stylesheet" href="styles.css">
    <script type="module" src="site-menu.js"></script>
</head>
<body class="bg-light-blue text-dark-gray">
    <div id="header-placeholder"></div>
    <div class="container bg-light-blue rounded-lg shadow-lg">
        <h1 class="main-title">Admin Panel</h1>
        <div id="user-info">Logged in as: <span id="username"></span></div>

        <!-- Manage Year Groups and Subjects Section -->
        <section class="section">
            <h2>Manage Year Groups and Subjects</h2>
            <div class="form-section">
                <h3>Year Groups</h3>
                <input type="text" id="year-group-name" placeholder="Enter new year group name">
                <button class="button" onclick="addYearGroup()">Add Year Group</button>
                <div class="list-container" id="year-group-list">
                    <!-- Year groups will be populated here -->
                </div>
            </div>
            <div class="form-section">
                <h3>Subjects</h3>
                <input type="text" id="subject-name" placeholder="Enter new subject name">
                <button class="button" onclick="addSubject()">Add Subject</button>
                <div class="list-container" id="subject-list">
                    <!-- Subjects will be populated here -->
                </div>
            </div>
        </section>

        <!-- Manage Users Section -->
        <section class="section">
            <h2>Manage Users</h2>
            <form id="manageUsersForm">
                <div class="form-section">
                    <label for="username-input">Username:</label>
                    <input type="text" id="username-input" class="input-text" placeholder="Enter Username">
                    <label for="password">Password:</label>
                    <input type="password" id="password" class="input-text" placeholder="Enter Password">
                    <label for="isAdmin">Admin:</label>
                    <input type="checkbox" id="isAdmin">
                    <button type="button" class="button" onclick="addUser()">Add User</button>
                    <button type="button" class="button delete" onclick="deleteUser()">Delete User</button>
                </div>
		<div class="form-section">
	  	<label for="change-password-username">Username:</label>
  		<input type="text" id="change-password-username" placeholder="Username for password change">
  		<label for="new-password">New Password:</label>
  		<input type="password" id="new-password" placeholder="New Password">
  		<button class="button" onclick="changePassword()">Change Password</button>
		</div>

            </form>
        </section>

        <!-- Staff Comment Bank Management Section -->
        <section class="section">
            <h2>Staff Comment Banks</h2>
            <div class="form-section">
                <label for="staff-bank-user">Staff user:</label>
                <select id="staff-bank-user" onchange="loadStaffBankContext()">
                    <option value="">Select Staff User</option>
                </select>

                <label for="staff-bank-subject">Subject:</label>
                <select id="staff-bank-subject" onchange="loadStaffBankContext()">
                    <option value="">Select Subject</option>
                </select>

                <label for="staff-bank-year-group">Year Group:</label>
                <select id="staff-bank-year-group" onchange="loadStaffBankContext()">
                    <option value="">Select Year Group</option>
                </select>
            </div>

            <div class="form-section">
                <label for="staff-bank-subject-description">Subject description:</label>
                <textarea id="staff-bank-subject-description" rows="4" maxlength="2000"></textarea>

                <label for="staff-bank-word-limit">Default word limit (optional):</label>
                <input type="number" id="staff-bank-word-limit" min="1" placeholder="e.g. 140">

                <label for="staff-bank-prompt">Prompt text:</label>
                <textarea id="staff-bank-prompt" rows="4" maxlength="5000"></textarea>
                <button type="button" class="button" onclick="saveStaffBankContextAndPrompt()">Save Staff Context</button>
            </div>

            <div class="form-section">
                <label for="staff-bank-pupil-names">Pupil names to redact (comma separated):</label>
                <input type="text" id="staff-bank-pupil-names" maxlength="2000" placeholder="Enter pupil names separated by commas">

                <label for="staff-bank-report-file">Optional plain text report file:</label>
                <input type="file" id="staff-bank-report-file" accept=".txt,text/plain" onchange="loadStaffReportFile()">

                <label for="staff-bank-reports">Previous reports:</label>
                <textarea id="staff-bank-reports" rows="10" maxlength="60000" placeholder="Paste previous reports here"></textarea>

                <label for="staff-bank-import-mode">Import mode:</label>
                <select id="staff-bank-import-mode" onchange="toggleStaffReplaceConfirm()">
                    <option value="merge" selected>Merge with existing comments</option>
                    <option value="replace">Replace selected staff bank</option>
                </select>

                <label id="staff-bank-replace-confirm-wrapper" style="display: none;">
                    <input type="checkbox" id="staff-bank-confirm-replace">
                    I understand this will replace only this staff user's selected subject/year group comments.
                </label>

                <button type="button" class="button" id="staff-bank-import-button" onclick="importStaffReports()">Import Reports For Staff</button>
                <div id="staff-bank-result" class="result-section"></div>
            </div>
        </section>

        <!-- Database Management Section -->
        <section class="section">
            <h2>Database Management</h2>
            <button type="button" class="button" onclick="exportDatabase()">Export Database</button>
            <button type="button" class="button" onclick="backupDatabase()">Backup Database</button>
            <p class="warning">Warning: These actions can significantly affect the database. Proceed with caution.</p>
        </section>
    </div>
    <div id="footer-placeholder"></div>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            fetchUsername();
            fetch("header.html").then(response => response.text()).then(data => {
                document.getElementById("header-placeholder").innerHTML = data;
            });
            fetch("footer.html").then(response => response.text()).then(data => {
                document.getElementById("footer-placeholder").innerHTML = data;
            });
	    // Check if the user is authenticated
            fetch('/api/authenticated')
                .then(response => {
                    if (!response.ok) {
                        window.location.href = 'admin-login.html';
                    }
                });
	    
                checkAdminStatus();

    	    function checkAdminStatus() {
        	fetch('/api/user-info', {
             	credentials: 'include'  // Make sure cookies are included with the request
        	})
        	.then(response => response.json())
        	.then(data => {
            	if (!data.isAdmin) {
                	alert('Access Denied: You do not have admin privileges.');
                	window.location.href = 'index.html'; // Redirect non-admins to a different page
            	}
        	})
        	.catch(error => {
            		console.error('Failed to check admin status:', error);
            		window.location.href = 'admin-login.html'; // Redirect to login if there's an error
        	});
    		}
 
		
            loadYearGroups();
            loadSubjects();
            loadStaffCommentUsers();
        });

        // Fetch username
        async function fetchUsername() {
            try {
                const response = await fetch('/api/user-info');
                if (response.ok) {
                    const data = await response.json();
                    document.getElementById('username').textContent = data.username;
                } else {
                    console.error('Failed to fetch username');
                }
            } catch (error) {
                console.error('Error fetching username:', error);
            }
        }

        // Functions to load and manage year groups
        async function loadYearGroups() {
            const response = await fetch('/api/year-groups');
            const yearGroups = await response.json();
            const yearGroupList = document.getElementById('year-group-list');
            yearGroupList.innerHTML = '';
            yearGroups.forEach(yearGroup => {
                const item = document.createElement('div');
                item.classList.add('list-item');
                item.innerHTML = `
                    <span>${yearGroup.name}</span>
                    <button class="button delete" onclick="deleteYearGroup(${yearGroup.id})">Delete</button>
                `;
                yearGroupList.appendChild(item);
            });
            const staffYearGroupSelect = document.getElementById('staff-bank-year-group');
            if (staffYearGroupSelect) {
                const selectedValue = staffYearGroupSelect.value;
                staffYearGroupSelect.innerHTML = '<option value="">Select Year Group</option>';
                yearGroups.forEach(yearGroup => {
                    const option = document.createElement('option');
                    option.value = yearGroup.id;
                    option.textContent = yearGroup.name;
                    staffYearGroupSelect.appendChild(option);
                });
                staffYearGroupSelect.value = selectedValue;
            }
        }

        async function addYearGroup() {
            const name = document.getElementById('year-group-name').value;
            if (name) {
                const response = await fetch('/api/year-groups', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name })
                });
                if (response.ok) {
                    document.getElementById('year-group-name').value = '';
                    loadYearGroups();
                } else {
                    alert('Error adding year group.');
                }
            } else {
                alert('Please enter a name for the year group.');
            }
        }

        async function deleteYearGroup(id) {
            if (confirm('Are you sure you want to delete this year group?')) {
                const response = await fetch(`/api/year-groups/${id}`, { method: 'DELETE' });
                if (response.ok) {
                    loadYearGroups();
                } else {
                    alert('Error deleting year group.');
                }
            }
        }

        // Functions to load and manage subjects
        async function loadSubjects() {
            const response = await fetch('/api/subjects');
            const subjects = await response.json();
            const subjectList = document.getElementById('subject-list');
            subjectList.innerHTML = '';
            subjects.forEach(subject => {
                const item = document.createElement('div');
                item.classList.add('list-item');
                item.innerHTML = `
                    <span>${subject.name}</span>
                    <button class="button delete" onclick="deleteSubject(${subject.id})">Delete</button>
                `;
                subjectList.appendChild(item);
            });
            const staffSubjectSelect = document.getElementById('staff-bank-subject');
            if (staffSubjectSelect) {
                const selectedValue = staffSubjectSelect.value;
                staffSubjectSelect.innerHTML = '<option value="">Select Subject</option>';
                subjects.forEach(subject => {
                    const option = document.createElement('option');
                    option.value = subject.id;
                    option.textContent = subject.name;
                    staffSubjectSelect.appendChild(option);
                });
                staffSubjectSelect.value = selectedValue;
            }
        }

        async function addSubject() {
            const name = document.getElementById('subject-name').value;
            if (name) {
                const response = await fetch('/api/subjects', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name })
                });
                if (response.ok) {
                    document.getElementById('subject-name').value = '';
                    loadSubjects();
                } else {
                    alert('Error adding subject.');
                }
            } else {
                alert('Please enter a name for the subject.');
            }
        }

        async function deleteSubject(id) {
            if (confirm('Are you sure you want to delete this subject?')) {
                const response = await fetch(`/api/subjects/${id}`, { method: 'DELETE' });
                if (response.ok) {
                    loadSubjects();
                } else {
                    alert('Error deleting subject.');
                }
            }
        }

        // Functions to manage users
        async function addUser() {
            const username = document.getElementById('username-input').value;
            const password = document.getElementById('password').value;
            const isAdmin = document.getElementById('isAdmin').checked;
            if (username && password) {
                const response = await fetch('/api/users', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, isAdmin })
                });
                if (response.ok) {
                    document.getElementById('username-input').value = '';
                    document.getElementById('password').value = '';
                    document.getElementById('isAdmin').checked = false;
                    alert('User added successfully.');
                } else {
                    alert('Error adding user.');
                }
            } else {
                alert('Please enter a username and password.');
            }
        }

        async function deleteUser() {
            const username = document.getElementById('username-input').value;
            if (username) {
                const response = await fetch(`/api/users/${username}`, { method: 'DELETE' });
                if (response.ok) {
                    document.getElementById('username-input').value = '';
                    document.getElementById('password').value = '';
                    document.getElementById('isAdmin').checked = false;
                    alert('User deleted successfully.');
                } else {
                    alert('Error deleting user.');
                }
            } else {
                alert('Please enter a username.');
            }
        }
        async function changePassword() {
  const username = document.getElementById('change-password-username').value;
  const newPassword = document.getElementById('new-password').value;
  if (username && newPassword) {
    try {
      console.log('Sending password change request:', newPassword); // Debug log
      const response = await fetch(`/api/admin/user/${encodeURIComponent(username)}/password`, {
        method: 'PUT',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ newPassword }),
        credentials: 'include' // Include credentials with the request
      });

      // Check if response is not ok
      if (!response.ok) {
        const errorMessage = await response.text();
        console.error('Failed to change password:', response.statusText, errorMessage);
        alert('Failed to change password: ' + errorMessage);
      } else {
        alert('Password changed successfully.');
      }
    } catch (error) {
      console.error('Error changing password:', error);
      alert('Error changing password: ' + error.message);
    }
  } else {
    alert('Please fill in both fields.');
  }
}


        async function loadStaffCommentUsers() {
            try {
                const response = await fetch('/api/users');
                if (!response.ok) {
                    return;
                }
                const users = await response.json();
                const userSelect = document.getElementById('staff-bank-user');
                userSelect.innerHTML = '<option value="">Select Staff User</option>';
                users.forEach(user => {
                    const option = document.createElement('option');
                    option.value = user.id;
                    option.textContent = `${user.username}${user.isAdmin ? ' (admin)' : ''}`;
                    userSelect.appendChild(option);
                });
            } catch (error) {
                console.error('Error loading staff users:', error);
            }
        }

        function getStaffBankSelection() {
            return {
                userId: document.getElementById('staff-bank-user').value,
                subjectId: document.getElementById('staff-bank-subject').value,
                yearGroupId: document.getElementById('staff-bank-year-group').value
            };
        }

        function setStaffBankResult(message) {
            document.getElementById('staff-bank-result').textContent = message;
        }

        async function parseResponseMessage(response) {
            const text = await response.text();
            try {
                const payload = JSON.parse(text);
                return payload.message || text;
            } catch {
                return text;
            }
        }

        async function loadStaffBankContext() {
            const { userId, subjectId, yearGroupId } = getStaffBankSelection();
            if (!userId || !subjectId || !yearGroupId) {
                return;
            }

            try {
                const [contextResponse, promptResponse, bankResponse] = await Promise.all([
                    fetch(`/api/admin/staff/${encodeURIComponent(userId)}/subject-context?subjectId=${encodeURIComponent(subjectId)}&yearGroupId=${encodeURIComponent(yearGroupId)}`),
                    fetch(`/api/admin/staff/${encodeURIComponent(userId)}/prompts/${encodeURIComponent(subjectId)}/${encodeURIComponent(yearGroupId)}`),
                    fetch(`/api/admin/staff/${encodeURIComponent(userId)}/comment-bank?subjectId=${encodeURIComponent(subjectId)}&yearGroupId=${encodeURIComponent(yearGroupId)}`)
                ]);

                if (contextResponse.ok) {
                    const context = await contextResponse.json();
                    document.getElementById('staff-bank-subject-description').value = context.subjectDescription || '';
                    document.getElementById('staff-bank-word-limit').value = context.wordLimit || '';
                }

                if (promptResponse.ok) {
                    const prompt = await promptResponse.json();
                    document.getElementById('staff-bank-prompt').value = prompt.promptPart || '';
                }

                if (bankResponse.ok) {
                    const categories = await bankResponse.json();
                    const commentCount = categories.reduce((sum, category) => sum + ((category.Comments || []).length), 0);
                    setStaffBankResult(`Current bank: ${categories.length} categories, ${commentCount} comments.`);
                }
            } catch (error) {
                console.error('Error loading staff comment bank context:', error);
                setStaffBankResult('Error loading staff comment bank context.');
            }
        }

        async function saveStaffBankContextAndPrompt() {
            const { userId, subjectId, yearGroupId } = getStaffBankSelection();
            if (!userId || !subjectId || !yearGroupId) {
                alert('Please select a staff user, subject, and year group.');
                return false;
            }

            const subjectDescription = document.getElementById('staff-bank-subject-description').value;
            const wordLimit = document.getElementById('staff-bank-word-limit').value;
            const promptPart = document.getElementById('staff-bank-prompt').value;

            try {
                const [contextResponse, promptResponse] = await Promise.all([
                    fetch(`/api/admin/staff/${encodeURIComponent(userId)}/subject-context`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ subjectId, yearGroupId, subjectDescription, wordLimit })
                    }),
                    fetch(`/api/admin/staff/${encodeURIComponent(userId)}/prompts`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ subjectId, yearGroupId, promptPart })
                    })
                ]);

                if (!contextResponse.ok || !promptResponse.ok) {
                    const message = !contextResponse.ok
                        ? await parseResponseMessage(contextResponse)
                        : await parseResponseMessage(promptResponse);
                    alert(`Error saving staff context: ${message}`);
                    return false;
                }

                setStaffBankResult('Staff context saved.');
                return true;
            } catch (error) {
                console.error('Error saving staff context:', error);
                alert('Error saving staff context.');
                return false;
            }
        }

        async function loadStaffReportFile() {
            const fileInput = document.getElementById('staff-bank-report-file');
            const file = fileInput.files[0];
            if (!file) {
                return;
            }
            const text = await file.text();
            document.getElementById('staff-bank-reports').value = text;
        }

        function toggleStaffReplaceConfirm() {
            const mode = document.getElementById('staff-bank-import-mode').value;
            const wrapper = document.getElementById('staff-bank-replace-confirm-wrapper');
            wrapper.style.display = mode === 'replace' ? 'block' : 'none';
            if (mode !== 'replace') {
                document.getElementById('staff-bank-confirm-replace').checked = false;
            }
        }

        async function importStaffReports() {
            const { userId, subjectId, yearGroupId } = getStaffBankSelection();
            const pupilNames = document.getElementById('staff-bank-pupil-names').value;
            const reports = document.getElementById('staff-bank-reports').value;
            const mode = document.getElementById('staff-bank-import-mode').value;
            const confirmReplace = document.getElementById('staff-bank-confirm-replace').checked;

            if (!userId || !subjectId || !yearGroupId || !pupilNames || !reports) {
                alert('Please select staff, subject, year group, pupil names, and reports.');
                return;
            }

            if (mode === 'replace' && !confirmReplace) {
                alert('Please confirm replace mode before importing.');
                return;
            }

            const saved = await saveStaffBankContextAndPrompt();
            if (!saved) {
                return;
            }

            const importButton = document.getElementById('staff-bank-import-button');
            importButton.disabled = true;
            setStaffBankResult('Importing reports. This may take a while.');

            try {
                const response = await fetch(`/api/admin/staff/${encodeURIComponent(userId)}/import-reports`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        subjectId,
                        yearGroupId,
                        pupilNames,
                        reports,
                        mode,
                        confirmReplace
                    })
                });

                const text = await response.text();
                let payload = {};
                try {
                    payload = text ? JSON.parse(text) : {};
                } catch {
                    payload = { message: text };
                }
                if (!response.ok) {
                    throw new Error(payload.message || 'Error importing reports for staff.');
                }

                setStaffBankResult(
                    `Imported for ${payload.targetUser?.username || 'staff user'}: ${payload.totalCategories} categories, ${payload.totalComments} comments, ${payload.mode} mode.`
                );
                document.getElementById('staff-bank-reports').value = '';
                document.getElementById('staff-bank-report-file').value = '';
            } catch (error) {
                console.error('Error importing reports for staff:', error);
                setStaffBankResult(error.message);
            } finally {
                importButton.disabled = false;
            }
        }



        async function exportDatabase() {
            try {
                const response = await fetch('/api/export-database');
                if (response.ok) {
                    const blob = await response.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.style.display = 'none';
                    a.href = url;
                    a.download = 'database-backup.sql';
                    document.body.appendChild(a);
                    a.click();
                    window.URL.revokeObjectURL(url);
                    alert('Database exported successfully.');
                } else {
                    alert('Error exporting database.');
                }
            } catch (error) {
                console.error('Error exporting database:', error);
                alert('Error exporting database.');
            }
        }

        async function backupDatabase() {
            try {
                const response = await fetch('/api/backup-database', { method: 'POST' });
                if (response.ok) {
                    alert('Database backup created successfully.');
                } else {
                    alert('Error creating database backup.');
                }
            } catch (error) {
                console.error('Error creating database backup:', error);
                alert('Error creating database backup.');
            }
        }
    </script>
</body>
</html>
