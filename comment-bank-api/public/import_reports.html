<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Import Reports</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="manifest" href="/site.webmanifest">
    <script type="module" src="site-menu.js"></script>
    <script type="module" src="page-layout.js"></script>
    <script type="module" src="app-ui.js"></script>
    <script type="module" src="import-summary.js"></script>
</head>
<body>
    <!-- Include header -->
    <div id="header-placeholder"></div>
    <div class="container">
        <h1 class="main-title">Import Reports</h1>

        <div id="form-container">
            <div class="subject-year">
                <div class="form-section">
                    <!-- <label for="subject-select">Subject:</label> -->
                    <select id="subject-select" onchange="updateImportContext()">
                        <option value="">Select Subject</option>
                        <!-- Options will be populated dynamically -->
                    </select>
                </div>

                <div class="form-section">
                    <!-- <label for="year-group-select">Year Group:</label> -->
                    <select id="year-group-select" onchange="updateImportContext()">
                        <option value="">Select Year Group</option>
                        <!-- Options will be populated dynamically -->
                    </select>
                </div>
            </div>

            <div id="import-context" class="context-summary" hidden></div>

            <div class="form-section">
                <label for="pupil-names">Pupil Names (comma separated):</label>
                <input type="text" id="pupil-names" placeholder="Enter pupil names separated by commas...">
            </div>

            <div class="form-section">
                <label for="reports">Reports:</label>
                <textarea id="reports" rows="10" placeholder="Paste the reports here..."></textarea>
            </div>

            <button class="button savePrompt" id="genReportButton" onclick="importReports()">Import Reports</button>
        </div>
    </div>
    <div id="result-container" class="result-section"></div>
    <div id="footer-placeholder"></div>
    <script>
        let globalUserSubjects = [];
        let globalUserYearGroups = [];

        // Function to load header
        document.addEventListener("DOMContentLoaded", async function() {
            if (!await isAuthenticated()) {
                window.location.href = 'login.html';
                return;
            }

            loadSettings();
            setupImportValidationListeners();
        });

        async function isAuthenticated() {
            try {
                const response = await fetch('/api/authenticated');
                if (response.ok) {
                    const data = await response.json();
                    return data.authenticated;
                } else {
                    return false;
                }
            } catch (error) {
                console.error('Error checking authentication:', error);
                return false;
            }
        }

        async function loadSettings() {
            try {
                const response = await fetch('/api/user-selected-settings');
                const settings = await response.json();
                globalUserSubjects = settings.userSubjects;
                globalUserYearGroups = settings.userYearGroups;
                loadSubjects(); // Initial load
                loadYearGroups(); // Initial load
            } catch (error) {
                console.error('Error loading settings:', error);
            }
        }

        function resolveSubjectOption(subject) {
            const nested = subject?.Subject || subject?.subject;
            return {
                id: nested?.id ?? subject?.subjectId ?? subject?.id ?? '',
                name: nested?.name ?? subject?.name ?? ''
            };
        }

        function resolveYearGroupOption(yearGroup) {
            const nested = yearGroup?.YearGroup || yearGroup?.yearGroup;
            return {
                id: nested?.id ?? yearGroup?.yearGroupId ?? yearGroup?.id ?? '',
                name: nested?.name ?? yearGroup?.name ?? ''
            };
        }

        async function loadSubjects() {
            const response = await fetch('/api/subjects');
            const subjects = await response.json();
            const subjectSelect = document.getElementById('subject-select');
            subjectSelect.innerHTML = '<option value="">Select Subject</option>';

            const selectedSubjects = globalUserSubjects.length ? globalUserSubjects : subjects;
            selectedSubjects.forEach(subject => {
                const { id, name } = resolveSubjectOption(subject);
                if (!id || !name) {
                    return;
                }
                const option = document.createElement('option');
                option.value = id;
                option.textContent = name;
                subjectSelect.appendChild(option);
            });
        }

        async function loadYearGroups() {
            const response = await fetch('/api/year-groups');
            const yearGroups = await response.json();
            const yearGroupSelect = document.getElementById('year-group-select');
            yearGroupSelect.innerHTML = '<option value="">Select Year Group</option>';

            const selectedYearGroups = globalUserYearGroups.length ? globalUserYearGroups : yearGroups;
            selectedYearGroups.forEach(yearGroup => {
                const { id, name } = resolveYearGroupOption(yearGroup);
                if (!id || !name) {
                    return;
                }
                const option = document.createElement('option');
                option.value = id;
                option.textContent = name;
                yearGroupSelect.appendChild(option);
            });
        }

        function updateImportContext() {
            window.ReportGenUI?.renderContextSummary('#import-context', [
                { label: 'Subject', value: window.ReportGenUI?.getSelectedOptionText('#subject-select') },
                { label: 'Year group', value: window.ReportGenUI?.getSelectedOptionText('#year-group-select') }
            ]);
            clearImportFieldState('subject-select');
            clearImportFieldState('year-group-select');
        }

        function clearImportFieldState(id) {
            window.ReportGenUI?.setFieldInvalid(`#${id}`, false);
        }

        function markImportFieldInvalid(id) {
            window.ReportGenUI?.setFieldInvalid(`#${id}`, true);
            document.getElementById(id)?.focus();
        }

        function clearImportValidation() {
            ['subject-select', 'year-group-select', 'pupil-names', 'reports'].forEach(clearImportFieldState);
        }

        function setupImportValidationListeners() {
            ['pupil-names', 'reports'].forEach((id) => {
                document.getElementById(id)?.addEventListener('input', () => clearImportFieldState(id));
            });
        }

        async function parseImportResponse(response) {
            const text = await response.text();
            try {
                return text ? JSON.parse(text) : {};
            } catch {
                return { message: text };
            }
        }

        async function importReports() {
            const subjectId = document.getElementById('subject-select').value;
            const yearGroupId = document.getElementById('year-group-select').value;
            const pupilNames = document.getElementById('pupil-names').value;
            const reports = document.getElementById('reports').value;
            const genReportButton = document.getElementById('genReportButton');

            clearImportValidation();
            if (!subjectId) {
                markImportFieldInvalid('subject-select');
                window.ReportGenUI?.showStatus('#result-container', 'Please choose a subject before importing reports.', { tone: 'warning' });
                return;
            }
            if (!yearGroupId) {
                markImportFieldInvalid('year-group-select');
                window.ReportGenUI?.showStatus('#result-container', 'Please choose a year group before importing reports.', { tone: 'warning' });
                return;
            }
            if (!pupilNames.trim()) {
                markImportFieldInvalid('pupil-names');
                window.ReportGenUI?.showStatus('#result-container', 'Please add the pupil names to redact before importing reports.', { tone: 'warning' });
                return;
            }
            if (!reports.trim()) {
                markImportFieldInvalid('reports');
                window.ReportGenUI?.showStatus('#result-container', 'Please paste the reports before starting the import.', { tone: 'warning' });
                return;
            }

            window.ReportGenUI?.setButtonLoading(genReportButton, true, 'Importing...');
            window.ReportGenUI?.showStatus('#result-container', 'Generating comments and categories. This may take a while.', { tone: 'info' });

            try {
                const response = await fetch('/api/import-reports', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        subjectId,
                        yearGroupId,
                        pupilNames,
                        reports
                    })
                });

                const result = await parseImportResponse(response);
                if (!response.ok) {
                    throw new Error(result.message || 'Import failed.');
                }

                const summary = window.ReportGenImportSummary?.formatImportSummary(result, {
                    targetLabel: 'your comment bank'
                }) || result.message || 'Import completed.';
                window.ReportGenUI?.showStatus('#result-container', summary, { tone: 'success' });
            } catch (error) {
                console.error('Error importing reports:', error);
                window.ReportGenUI?.showStatus('#result-container', error.message, { tone: 'error' });
            } finally {
                window.ReportGenUI?.setButtonLoading(genReportButton, false);
            }
        }
    </script>
</body>
</html>
