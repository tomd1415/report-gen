<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Comments and Categories</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="manifest" href="/site.webmanifest">
    <script type="module" src="site-menu.js"></script>
    <script type="module" src="page-layout.js"></script>
    <script type="module" src="app-ui.js"></script>
</head>
<body class="bg-gray-100 text-gray-900">

    <!-- Include header -->
    <div id="header-placeholder"></div>

    <div class="container mx-auto p-4 bg-white rounded-lg shadow-lg">
        <h1 class="main-title">Manage Comments and Categories</h1>

        <div id="form-container">
            <div class="subject-year">
                <div class="form-section">
                    <!--
                    <label for="subject-select" class="block text-center">Subject:</label>
                    -->
                    <select id="subject-select" onchange="loadCategoriesAndComments(); updateManageCommentsContext();"
                            class="border border-gray-300 rounded-md shadow-sm text-2xl text-center bg-green-200">
                        <option value="">Select Subject</option>
                    </select>
                </div>

                <div class="form-section">
                    <!--
                    <label for="year-group-select" class="block text-center">Year Group:</label>
                    -->
                    <select id="year-group-select" onchange="loadCategoriesAndComments(); updateManageCommentsContext();"
                            class="border border-gray-300 rounded-md shadow-sm text-2xl text-center bg-green-200">
                        <option value="">Select Year Group</option>
                    </select>
                </div>
            </div>

            <div id="manage-comments-context" class="context-summary" hidden></div>
            <div id="manage-comments-status" class="status-panel" hidden></div>
            <div class="category-controls manage-comment-controls" id="manage-comment-controls" hidden>
                <button type="button" class="button inline-button" onclick="setAllManageCategoriesExpanded(true)">Expand all</button>
                <button type="button" class="button inline-button" onclick="setAllManageCategoriesExpanded(false)">Collapse all</button>
                <span id="comment-bank-counts" class="context-chip"></span>
            </div>

            <div id="new-category">
                <div class="form-section">
                    <label for="new-category-name" class="block text-center">New Category Name:</label>
                    <input type="text" id="new-category-name" placeholder="Enter new category name"
                           class="border border-gray-300 rounded-md shadow-sm mb-0 p-1 text-center">
                    <button class="button bg-blue-600 text-white px-4 py-2 rounded-md" onclick="addCategory(this)">Add Category</button>
                </div>
            </div>
            <div class="filter-bar">
                <input type="text" id="comment-bank-filter" class="filter-input" placeholder="Search categories and comments..." oninput="applyCommentBankFilter()">
            </div>
            <div id="categories-container" class="comment-categories-container">
                <!-- Categories and comments will be populated here -->
            </div>
        </div>
    </div>

    <div id="footer-placeholder"></div>

    <script>
        let globalUserSubjects = [];
        let globalUserYearGroups = [];

        // Function to load header and footer
        document.addEventListener("DOMContentLoaded", async function() {
            if (!await isAuthenticated()) {
                window.location.href = 'login.html';
                return;
            }

            loadSettings();
        });

        async function isAuthenticated() {
            try {
                const response = await fetch('/api/authenticated');
                if (response.ok) {
                    const data = await response.json();
                    return data.authenticated;
                } else {
                    return false;
                }
            } catch (error) {
                console.error('Error checking authentication:', error);
                return false;
            }
        }

        async function loadSettings() {
            try {
                const response = await fetch('/api/user-selected-settings');
                const settings = await response.json();
                globalUserSubjects = settings.userSubjects;
                globalUserYearGroups = settings.userYearGroups;
                loadSubjects(); // Initial load
                loadYearGroups(); // Initial load
            } catch (error) {
                console.error('Error loading settings:', error);
            }
        }

        function resolveSubjectOption(subject) {
            const nested = subject?.Subject || subject?.subject;
            return {
                id: nested?.id ?? subject?.subjectId ?? subject?.id ?? '',
                name: nested?.name ?? subject?.name ?? ''
            };
        }

        function resolveYearGroupOption(yearGroup) {
            const nested = yearGroup?.YearGroup || yearGroup?.yearGroup;
            return {
                id: nested?.id ?? yearGroup?.yearGroupId ?? yearGroup?.id ?? '',
                name: nested?.name ?? yearGroup?.name ?? ''
            };
        }

        function updateManageCommentsContext() {
            window.ReportGenUI?.renderContextSummary('#manage-comments-context', [
                { label: 'Subject', value: window.ReportGenUI?.getSelectedOptionText('#subject-select') },
                { label: 'Year group', value: window.ReportGenUI?.getSelectedOptionText('#year-group-select') }
            ]);
        }

        function escapeHtml(value) {
            return String(value || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        async function parseResponseMessage(response) {
            const text = await response.text();
            try {
                const payload = JSON.parse(text);
                return payload.message || text;
            } catch {
                return text;
            }
        }

        async function loadSubjects() {
            const response = await fetch('/api/subjects');
            const subjects = await response.json();
            const subjectSelect = document.getElementById('subject-select');
            subjectSelect.innerHTML = '<option value="">Select Subject</option>';

            const selectedSubjects = globalUserSubjects.length ? globalUserSubjects : subjects;
            selectedSubjects.forEach(subject => {
                const { id, name } = resolveSubjectOption(subject);
                if (!id || !name) {
                    return;
                }
                const option = document.createElement('option');
                option.value = id;
                option.textContent = name;
                subjectSelect.appendChild(option);
            });
        }

        async function loadYearGroups() {
            const response = await fetch('/api/year-groups');
            const yearGroups = await response.json();
            const yearGroupSelect = document.getElementById('year-group-select');
            yearGroupSelect.innerHTML = '<option value="">Select Year Group</option>';

            const selectedYearGroups = globalUserYearGroups.length ? globalUserYearGroups : yearGroups;
            selectedYearGroups.forEach(yearGroup => {
                const { id, name } = resolveYearGroupOption(yearGroup);
                if (!id || !name) {
                    return;
                }
                const option = document.createElement('option');
                option.value = id;
                option.textContent = name;
                yearGroupSelect.appendChild(option);
            });
        }

        // Function to toggle category visibility
        function toggleCategory(categoryDiv) {
            const commentsContainer = categoryDiv.querySelector('.comments-container');
            commentsContainer.style.display = commentsContainer.style.display === 'none' ? 'block' : 'none';
            if (commentsContainer.style.display === 'none') {
                categoryDiv.querySelector('.expand').textContent = '+';
            } else {
                categoryDiv.querySelector('.expand').textContent = '-';
            }
            categoryDiv.classList.toggle('collapsed');
        }

        function countComments(categories) {
            return categories.reduce((sum, category) => sum + (category.Comments || []).length, 0);
        }

        function updateCommentBankCounts(categories) {
            const controls = document.getElementById('manage-comment-controls');
            const counts = document.getElementById('comment-bank-counts');
            if (!controls || !counts) {
                return;
            }

            if (!categories.length) {
                controls.hidden = true;
                counts.textContent = '';
                return;
            }

            const categoryCount = categories.length;
            const commentCount = countComments(categories);
            counts.textContent = `${categoryCount} ${categoryCount === 1 ? 'category' : 'categories'} / ${commentCount} ${commentCount === 1 ? 'comment' : 'comments'}`;
            controls.hidden = false;
        }

        function setAllManageCategoriesExpanded(expanded) {
            document.querySelectorAll('#categories-container .category').forEach((categoryDiv) => {
                const commentsContainer = categoryDiv.querySelector('.comments-container');
                const expand = categoryDiv.querySelector('.expand');
                if (commentsContainer) {
                    commentsContainer.style.display = expanded ? 'block' : 'none';
                }
                if (expand) {
                    expand.textContent = expanded ? '-' : '+';
                }
                categoryDiv.classList.toggle('collapsed', !expanded);
            });
        }

        function getCategoryDetails(button) {
            const category = button.closest('.category');
            const name = category?.dataset.categoryName || 'this category';
            const count = Number(category?.dataset.commentCount || 0);
            return { name, count };
        }

        function getCommentDetails(button) {
            const text = button.closest('.comment')?.querySelector('.comment-content')?.textContent.trim() || 'this comment';
            return text.length > 120 ? `${text.slice(0, 117)}...` : text;
        }

        // Fetch and populate categories and comments
        async function loadCategoriesAndComments() {
            const subjectId = document.getElementById('subject-select').value;
            const yearGroupId = document.getElementById('year-group-select').value;
            if (subjectId && yearGroupId) {
                window.ReportGenUI?.showStatus('#manage-comments-status', 'Loading categories and comments.', { tone: 'info' });
                try {
                    const response = await fetch(`/api/categories-comments?subjectId=${subjectId}&yearGroupId=${yearGroupId}`);
                    if (!response.ok) {
                        console.error('Failed to fetch categories and comments:', response.statusText);
                        window.ReportGenUI?.showStatus('#manage-comments-status', 'Unable to load categories and comments.', { tone: 'error' });
                        return;
                    }

                    const categories = await response.json();
                    const categoriesContainer = document.getElementById('categories-container');
                    categoriesContainer.innerHTML = '';
                    document.getElementById('new-category').style.display = 'block';
                    if (categories.length === 0) {
                        categoriesContainer.innerHTML = `
                            <div class="empty-state">
                                <h3>No categories yet</h3>
                                <p>This comment bank has no saved categories.</p>
                            </div>
                        `;
                        updateCommentBankCounts([]);
                        window.ReportGenUI?.showStatus('#manage-comments-status', 'No categories yet for this subject and year group. Add one to start building this comment bank.', { tone: 'info' });
                        return;
                    }
                    categories.forEach(category => {
                        const commentCount = (category.Comments || []).length;
                        const categoryDiv = document.createElement('div');
                        categoryDiv.classList.add('category', 'm-1', 'p-1', 'bg-blue-300', 'rounded-md', 'shadow-sm');
                        categoryDiv.dataset.categoryName = category.name;
                        categoryDiv.dataset.commentCount = String(commentCount);
                        categoryDiv.innerHTML = `
                            <h3 class="category-title" onclick="toggleCategory(this.parentElement)" data-category-id="${category.id}">
                                ${escapeHtml(category.name)}
                                <span class="category-count">${commentCount} ${commentCount === 1 ? 'comment' : 'comments'}</span>
                                <span class="expand">+</span>
                            </h3>
                            <button class="button delete" onclick="deleteCategory(${category.id}, this)">Delete Category</button>
                            <div class="comments-container" style="display: none;">
                                ${category.Comments.map(comment => `
                                    <div class="comment" data-comment-id="${comment.id}">
                                        <div class="comment-content" contenteditable="true" onblur="editComment(${comment.id}, this.textContent)">
                                            ${escapeHtml(comment.text)}
                                        </div>
                                        <div class="comment-actions">
                                            <select onchange="moveComment(${comment.id}, this.value)">
                                                <option value="">Move to...</option>
                                                ${categories.map(cat => `
                                                    <option value="${cat.id}" ${cat.id === category.id ? 'disabled' : ''}>${escapeHtml(cat.name)}</option>
                                                `).join('')}
                                            </select>
                                            <button class="button delete" onclick="deleteComment(${comment.id}, this)">Delete</button>
                                        </div>
                                    </div>
                                `).join('')}
                                <div>
                                    <textarea rows="2" placeholder="Add new comment"></textarea>
                                    <button class="button addcomment" onclick="addComment(${category.id}, this.previousElementSibling.value, this)">Add Comment</button>
                                </div>
                            </div>
                        `;
                        categoriesContainer.appendChild(categoryDiv);
                    });
                    updateCommentBankCounts(categories);
                    window.ReportGenUI?.showStatus('#manage-comments-status', `Loaded ${categories.length} categories.`, { tone: 'success' });
                    applyCommentBankFilter();
                } catch (error) {
                    console.error('Error loading categories and comments:', error);
                    window.ReportGenUI?.showStatus('#manage-comments-status', 'Error loading categories and comments.', { tone: 'error' });
                }
            } else {
                document.getElementById('new-category').style.display = 'none';
                document.getElementById('categories-container').innerHTML = '';
                updateCommentBankCounts([]);
                window.ReportGenUI?.clearStatus('#manage-comments-status');
            }
        }

        function applyCommentBankFilter() {
            const query = document.getElementById('comment-bank-filter').value;
            const result = window.ReportGenUI?.filterCommentBank('#categories-container', query);
            if (query && result) {
                window.ReportGenUI?.showStatus('#manage-comments-status', `Showing ${result.visible} of ${result.total} categories for "${query}".`, {
                    tone: result.visible ? 'info' : 'warning'
                });
            }
        }

        // Add new category
        async function addCategory(button) {
            const name = document.getElementById('new-category-name').value;
            const subjectId = document.getElementById('subject-select').value;
            const yearGroupId = document.getElementById('year-group-select').value;
            if (name && subjectId && yearGroupId) {
                window.ReportGenUI?.setButtonLoading(button, true, 'Adding...');
                try {
                    const response = await fetch('/api/categories', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ name, subjectId, yearGroupId })
                    });
                    if (!response.ok) {
                        console.error('Error adding category:', response.statusText);
                        window.ReportGenUI?.showStatus('#manage-comments-status', await parseResponseMessage(response) || 'Error adding category.', { tone: 'error' });
                        return;
                    }
                    document.getElementById('new-category-name').value = '';
                    window.ReportGenUI?.showStatus('#manage-comments-status', 'Category added.', { tone: 'success' });
                    await loadCategoriesAndComments();
                } catch (error) {
                    console.error('Error adding category:', error);
                    window.ReportGenUI?.showStatus('#manage-comments-status', 'Error adding category.', { tone: 'error' });
                } finally {
                    window.ReportGenUI?.setButtonLoading(button, false);
                }
            } else {
                window.ReportGenUI?.showStatus('#manage-comments-status', 'Please enter a category name and select a subject and year group.', { tone: 'warning' });
            }
        }

        // Edit category name
        async function editCategory(id, newName) {
            if (newName) {
                try {
                    const response = await fetch(`/api/categories/${id}`, {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ name: newName })
                    });
                    if (!response.ok) {
                        console.error('Error editing category:', response.statusText);
                        window.ReportGenUI?.showStatus('#manage-comments-status', await parseResponseMessage(response) || 'Error editing category.', { tone: 'error' });
                    } else {
                        window.ReportGenUI?.showStatus('#manage-comments-status', 'Category updated.', { tone: 'success' });
                    }
                } catch (error) {
                    console.error('Error editing category:', error);
                    window.ReportGenUI?.showStatus('#manage-comments-status', 'Error editing category.', { tone: 'error' });
                }
            }
        }

        // Delete category
        async function deleteCategory(id, button) {
            const { name, count } = getCategoryDetails(button);
            const commentLabel = `${count} ${count === 1 ? 'comment' : 'comments'}`;
            if (confirm(`Delete "${name}" and its ${commentLabel}? This cannot be undone.`)) {
                window.ReportGenUI?.setButtonLoading(button, true, 'Deleting...');
                try {
                    const response = await fetch(`/api/categories/${id}`, {
                        method: 'DELETE'
                    });
                    if (!response.ok) {
                        console.error('Error deleting category:', response.statusText);
                        window.ReportGenUI?.showStatus('#manage-comments-status', await parseResponseMessage(response) || 'Error deleting category.', { tone: 'error' });
                        return;
                    }
                    window.ReportGenUI?.showStatus('#manage-comments-status', 'Category deleted.', { tone: 'success' });
                    await loadCategoriesAndComments();
                } catch (error) {
                    console.error('Error deleting category:', error);
                    window.ReportGenUI?.showStatus('#manage-comments-status', 'Error deleting category.', { tone: 'error' });
                } finally {
                    window.ReportGenUI?.setButtonLoading(button, false);
                }
            }
        }

        // Add new comment
        async function addComment(categoryId, text, button) {
            if (text) {
                window.ReportGenUI?.setButtonLoading(button, true, 'Adding...');
                try {
                    const response = await fetch('/api/comments', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ text, categoryId })
                    });
                    if (!response.ok) {
                        console.error('Error adding comment:', response.statusText);
                        window.ReportGenUI?.showStatus('#manage-comments-status', await parseResponseMessage(response) || 'Error adding comment.', { tone: 'error' });
                        return;
                    }
                    window.ReportGenUI?.showStatus('#manage-comments-status', 'Comment added.', { tone: 'success' });
                    await loadCategoriesAndComments();
                } catch (error) {
                    console.error('Error adding comment:', error);
                    window.ReportGenUI?.showStatus('#manage-comments-status', 'Error adding comment.', { tone: 'error' });
                } finally {
                    window.ReportGenUI?.setButtonLoading(button, false);
                }
            } else {
                window.ReportGenUI?.showStatus('#manage-comments-status', 'Please enter a comment before adding it.', { tone: 'warning' });
            }
        }

        // Edit comment
        async function editComment(id, newText) {
            if (newText) {
                try {
                    const response = await fetch(`/api/comments/${id}`, {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ text: newText })
                    });
                    if (!response.ok) {
                        console.error('Error editing comment:', response.statusText);
                        window.ReportGenUI?.showStatus('#manage-comments-status', await parseResponseMessage(response) || 'Error editing comment.', { tone: 'error' });
                    } else {
                        window.ReportGenUI?.showStatus('#manage-comments-status', 'Comment updated.', { tone: 'success' });
                    }
                } catch (error) {
                    console.error('Error editing comment:', error);
                    window.ReportGenUI?.showStatus('#manage-comments-status', 'Error editing comment.', { tone: 'error' });
                }
            }
        }

        // Delete comment
        async function deleteComment(id, button) {
            const commentPreview = getCommentDetails(button);
            if (confirm(`Delete this comment?\n\n"${commentPreview}"`)) {
                window.ReportGenUI?.setButtonLoading(button, true, 'Deleting...');
                try {
                    const response = await fetch(`/api/comments/${id}`, {
                        method: 'DELETE'
                    });
                    if (!response.ok) {
                        console.error('Error deleting comment:', response.statusText);
                        window.ReportGenUI?.showStatus('#manage-comments-status', await parseResponseMessage(response) || 'Error deleting comment.', { tone: 'error' });
                        return;
                    }
                    window.ReportGenUI?.showStatus('#manage-comments-status', 'Comment deleted.', { tone: 'success' });
                    await loadCategoriesAndComments();
                } catch (error) {
                    console.error('Error deleting comment:', error);
                    window.ReportGenUI?.showStatus('#manage-comments-status', 'Error deleting comment.', { tone: 'error' });
                } finally {
                    window.ReportGenUI?.setButtonLoading(button, false);
                }
            }
        }

        // Move comment to a different category
        async function moveComment(commentId, newCategoryId) {
            if (newCategoryId) {
                try {
                    const response = await fetch('/api/move-comment', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ commentId, newCategoryId })
                    });
                    if (!response.ok) {
                        console.error('Error moving comment:', response.statusText);
                        window.ReportGenUI?.showStatus('#manage-comments-status', await parseResponseMessage(response) || 'Error moving comment.', { tone: 'error' });
                        return;
                    }
                    window.ReportGenUI?.showStatus('#manage-comments-status', 'Comment moved.', { tone: 'success' });
                    await loadCategoriesAndComments();
                } catch (error) {
                    console.error('Error moving comment:', error);
                    window.ReportGenUI?.showStatus('#manage-comments-status', 'Error moving comment.', { tone: 'error' });
                }
            }
        }

        // Allow dropping of comments
        function allowDrop(event) {
            event.preventDefault();
        }

        // Load subjects and year groups on page load
    </script>

</body>
</html>
