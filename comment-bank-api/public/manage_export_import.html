<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Export and Import Categories and Comments</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="manifest" href="/site.webmanifest">
    <script type="module" src="site-menu.js"></script>
    <script type="module" src="page-layout.js"></script>
    <script type="module" src="app-ui.js"></script>
    <script type="module" src="import-summary.js"></script>
</head>
<body class="bg-gray-100 text-gray-900">

    <!-- Include header -->
    <div id="header-placeholder"></div>

    <div class="container mx-auto p-4 bg-white rounded-lg shadow-lg">
        <h1 class="main-title">Save and Load Categories and Comments</h1>

        <div id="form-container">
            <div class="subject-year">
                <div class="form-section">
                    <select id="subject-select" class="form-control" onchange="updateCsvContext()">
                        <option value="">Select Subject</option>
                    </select>
                </div>
                <div class="form-section">
                    <select id="year-group-select" class="form-control" onchange="updateCsvContext()">
                        <option value="">Select Year Group</option>
                    </select>
                </div>
            </div>

            <div id="csv-context" class="context-summary" hidden></div>
            <div id="csv-status" class="status-panel" hidden></div>

            <div class="form-section">
                <button class="button" id="export-csv-button" onclick="exportCategoriesAndComments()">Export Categories and Comments</button>
            </div>

            <div class="form-section">
                <label for="upload-csv" class="block text-center">Import Categories and Comments:</label>
                <input type="file" id="upload-csv" class="border border-gray-300 rounded-md shadow-sm p-2">
                <button class="button bg-red-600 text-white px-4 py-2 rounded-md" id="import-csv-button" onclick="importCategoriesAndComments()">Import</button>
            </div>
        </div>
    </div>

    <div id="footer-placeholder"></div>

    <script>
        let globalUserSubjects = [];
        let globalUserYearGroups = [];

        // Function to load header and footer
        document.addEventListener("DOMContentLoaded", async function() {
            if (!await isAuthenticated()) {
                window.location.href = 'login.html';
                return;
            }

            loadSettings();
        });

        async function isAuthenticated() {
            try {
                const response = await fetch('/api/authenticated');
                if (response.ok) {
                    const data = await response.json();
                    return data.authenticated;
                } else {
                    return false;
                }
            } catch (error) {
                console.error('Error checking authentication:', error);
                return false;
            }
        }

        async function loadSettings() {
            try {
                const response = await fetch('/api/user-selected-settings');
                const settings = await response.json();
                globalUserSubjects = settings.userSubjects;
                globalUserYearGroups = settings.userYearGroups;
                loadSubjects(); // Initial load
                loadYearGroups(); // Initial load
            } catch (error) {
                console.error('Error loading settings:', error);
            }
        }

        function resolveSubjectOption(subject) {
            const nested = subject?.Subject || subject?.subject;
            return {
                id: nested?.id ?? subject?.subjectId ?? subject?.id ?? '',
                name: nested?.name ?? subject?.name ?? ''
            };
        }

        function resolveYearGroupOption(yearGroup) {
            const nested = yearGroup?.YearGroup || yearGroup?.yearGroup;
            return {
                id: nested?.id ?? yearGroup?.yearGroupId ?? yearGroup?.id ?? '',
                name: nested?.name ?? yearGroup?.name ?? ''
            };
        }

        async function loadSubjects() {
            const response = await fetch('/api/subjects');
            const subjects = await response.json();
            const subjectSelect = document.getElementById('subject-select');
            subjectSelect.innerHTML = '<option value="">Select Subject</option>';

            const selectedSubjects = globalUserSubjects.length ? globalUserSubjects : subjects;
            selectedSubjects.forEach(subject => {
                const { id, name } = resolveSubjectOption(subject);
                if (!id || !name) {
                    return;
                }
                const option = document.createElement('option');
                option.value = id;
                option.textContent = name;
                subjectSelect.appendChild(option);
            });
        }

        async function loadYearGroups() {
            const response = await fetch('/api/year-groups');
            const yearGroups = await response.json();
            const yearGroupSelect = document.getElementById('year-group-select');
            yearGroupSelect.innerHTML = '<option value="">Select Year Group</option>';

            const selectedYearGroups = globalUserYearGroups.length ? globalUserYearGroups : yearGroups;
            selectedYearGroups.forEach(yearGroup => {
                const { id, name } = resolveYearGroupOption(yearGroup);
                if (!id || !name) {
                    return;
                }
                const option = document.createElement('option');
                option.value = id;
                option.textContent = name;
                yearGroupSelect.appendChild(option);
            });
        }

        function updateCsvContext() {
            window.ReportGenUI?.renderContextSummary('#csv-context', [
                { label: 'Subject', value: window.ReportGenUI?.getSelectedOptionText('#subject-select') },
                { label: 'Year group', value: window.ReportGenUI?.getSelectedOptionText('#year-group-select') }
            ]);
        }

        function getCsvContextText() {
            const subject = window.ReportGenUI?.getSelectedOptionText('#subject-select') || 'the selected subject';
            const yearGroup = window.ReportGenUI?.getSelectedOptionText('#year-group-select') || 'the selected year group';
            return `${subject} / ${yearGroup}`;
        }

        async function exportCategoriesAndComments() {
            const subjectId = document.getElementById('subject-select').value;
            const yearGroupId = document.getElementById('year-group-select').value;
            const button = document.getElementById('export-csv-button');

            if (!subjectId || !yearGroupId) {
                window.ReportGenUI?.showStatus('#csv-status', 'Please select both subject and year group before exporting.', { tone: 'warning' });
                return;
            }

            window.ReportGenUI?.setButtonLoading(button, true, 'Exporting...');
            window.ReportGenUI?.showStatus('#csv-status', `Preparing export for ${getCsvContextText()}.`, { tone: 'info' });
            try {
                const response = await fetch(`/api/export-categories-comments?subjectId=${subjectId}&yearGroupId=${yearGroupId}`);
                if (!response.ok) {
                    throw new Error('Failed to fetch data for export.');
                }

                const data = await response.text();
                const blob = new Blob([data], { type: 'text/csv' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `categories-comments-${subjectId}-${yearGroupId}.csv`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                window.ReportGenUI?.showStatus('#csv-status', `Export ready for ${getCsvContextText()}.`, { tone: 'success' });
            } catch (error) {
                window.ReportGenUI?.showStatus('#csv-status', 'Error exporting categories and comments: ' + error.message, { tone: 'error' });
            } finally {
                window.ReportGenUI?.setButtonLoading(button, false);
            }
        }

        async function importCategoriesAndComments() {
            const subjectId = document.getElementById('subject-select').value;
            const yearGroupId = document.getElementById('year-group-select').value;
            const fileInput = document.getElementById('upload-csv');
            const button = document.getElementById('import-csv-button');

            if (!subjectId || !yearGroupId) {
                window.ReportGenUI?.showStatus('#csv-status', 'Please select both subject and year group before importing.', { tone: 'warning' });
                return;
            }

            if (!fileInput.files.length) {
                window.ReportGenUI?.showStatus('#csv-status', 'Please select a CSV file to upload.', { tone: 'warning' });
                return;
            }

            const confirmed = confirm(`Replace the existing categories and comments for ${getCsvContextText()}? This action cannot be undone.`);
            if (!confirmed) {
                window.ReportGenUI?.showStatus('#csv-status', 'Import cancelled. Existing comments were not changed.', { tone: 'info' });
                return;
            }

            const formData = new FormData();
            formData.append('file', fileInput.files[0]);
            formData.append('subjectId', subjectId);
            formData.append('yearGroupId', yearGroupId);

            window.ReportGenUI?.setButtonLoading(button, true, 'Importing...');
            window.ReportGenUI?.showStatus('#csv-status', `Importing CSV for ${getCsvContextText()}. Existing comments for this selection will be replaced.`, { tone: 'warning' });
            try {
                const response = await fetch('/api/import-categories-comments', {
                    method: 'POST',
                    body: formData
                });

                const text = await response.text();
                let payload = {};
                try {
                    payload = text ? JSON.parse(text) : {};
                } catch {
                    payload = { message: text };
                }
                if (!response.ok) {
                    throw new Error(payload.message || 'Failed to import categories and comments.');
                }

                const summary = window.ReportGenImportSummary?.formatImportSummary(payload, {
                    targetLabel: 'your comment bank'
                }) || payload.message || 'Categories and comments imported successfully.';
                window.ReportGenUI?.showStatus('#csv-status', summary, { tone: 'success' });
                fileInput.value = ''; // Clear the file input
            } catch (error) {
                window.ReportGenUI?.showStatus('#csv-status', 'Error importing categories and comments: ' + error.message, { tone: 'error' });
            } finally {
                window.ReportGenUI?.setButtonLoading(button, false);
            }
        }
    </script>
</body>
</html>
